<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style_cad.css">
    <script src="../js/usuario_cadastrar.js" defer></script>
    <title>Cadastro do Usuário</title>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>&emsp;&emsp;
            <span class="titulo_menu">Usuários</span>&emsp;
            <a href="./usuario_cadastrar.html">Cadastrar</a>&emsp;
            <a href="./usuario_listar.html">Listar</a>&emsp;
            <a href="./usuario_consultar.html">Consultar</a>&emsp;
            <a href="./usuario_atualizar.html">Atualizar</a>&emsp;
            <a href="./usuario_apagar.html">Apagar</a>
            <br><br><hr><br>
        </nav>
    </header>
    <main>
        <h2>Formulário de Cadastro Manual</h2>
        <br>
        <form id="form_manual">
            <label for="nome">Nome do Usuário</label><br>
            <input type="text" id="nome" required><br><br>

            <label for="email">E-mail</label><br>
            <input type="email" id="email" required><br><br>

            <label for="senha">Senha</label><br>
            <input type="password" id="senha" required><br><br>

            <button id="btn_cadastrar_manual">Cadastar Usuário</button>
        </form>
        
        <br><br><hr style="border: 1px dashed white; width: 60%; margin: 0 auto;"><br>

        <h2>Cadastro Automatizado em Lote</h2>
        <br>
        <div id="container_lote">
            <label>Realizar a carga inicial massiva importando dados estruturados diretamente da API externa DummyJSON:</label>
            <br><br>
            <button id="btn_carga_lote" style="background-color: #0284fd; width: 320px;">Executar Carga em Lote (BulkCreate)</button>
        </div>

        <br><br>
        <div id="resposta" class="resposta"></div>
    </main>
</body>
</html>
