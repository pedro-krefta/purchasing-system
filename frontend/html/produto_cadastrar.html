<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style_cad.css">
    <script src="../js/produto_cadastrar.js" defer></script>
    <title>Cadastro de Produto</title>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>&emsp;&emsp;
            <span class="titulo_menu">Produtos</span>&emsp;
            <a href="./produto_cadastrar.html">Cadastrar</a>&emsp;
            <a href="./produto_listar.html">Listar</a>&emsp;
            <a href="./produto_consultar.html">Consultar</a>&emsp;
            <a href="./produto_atualizar.html">Atualizar</a>&emsp;
            <a href="./produto_apagar.html">Apagar</a>
            <br><br><hr><br>
        </nav>
    </header>
    <main>
        <h2>Formulário de Cadastro Manual de Produto</h2>
        <br>
        <form id="form_manual">
            <label for="nome">Nome do Produto</label><br>
            <input type="text" id="nome" required><br><br>

            <label for="categoria">Categoria</label><br>
            <input type="text" id="categoria" required><br><br>

            <label for="quantidade">Quantidade em Estoque</label><br>
            <input type="number" id="quantidade" required><br><br>

            <label for="precoUnit">Preço Unitário</label><br>
            <input type="number" step="0.01" id="precoUnit" required><br><br>

            <button id="btn_cadastrar_manual">Cadastrar Produto</button>
        </form>
         
        <br><br><hr style="border: 1px dashed white; width: 60%; margin: 0 auto;"><br>

        <h2>Cadastro Automatizado de Produtos em Lote</h2>
        <br>
        <div id="container_lote">
            <label>Realizar a carga inicial massiva de mercadorias importando dados estruturados diretamente da API externa DummyJSON:</label>
            <br><br>
            <button id="btn_carga_lote" style="background-color: #0284fd; width: 320px;">Executar Carga em Lote (BulkCreate)</button>
        </div>

        <br><br>
        <div id="resposta" class="resposta"></div>
    </main>
</body>
</html>
