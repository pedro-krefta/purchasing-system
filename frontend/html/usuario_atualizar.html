    </header>
    <main>
        <h1>Atualizar Cadastro de Usuário</h1>
        <br><br>
        <form>
            <label for="codUsuario">Cód. Usuário: </label><br>
            <input type="number" id="codUsuario"><br>
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome"><br>
            <label for="sobrenome">Sobrenome:</label><br>
            <input type="text" id="sobrenome"><br>
            <label for="idade">Idade:</label><br>
            <input type="text" id="idade"><br>
            <label for="email">Email:</label><br>
            <input type="text" id="email"><br>
            <label for="telefone">Telefone:</label><br>
            <input type="text" id="telefone"><br>
            <label for="endereco">Endereço:</label><br>
            <input type="text" id="endereco"><br>
            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade"><br>
            <label for="estado">Estado:</label><br>
            <input type="text" id="estado"><br><br><br>
            <button id="btn_atualizar">Atualizar</button><br>
        </form>
        
        <div id="resposta" class="resposta"></div>
    </main>
