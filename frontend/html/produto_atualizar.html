<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style_cad.css">
    <script src="../js/produto_atualizar.js" defer></script>
    <title>Atualizar Produto</title>
</head>

<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>&emsp;&emsp;
            <span class="titulo_menu">Produtos</span>&emsp;
            <a href="./produto_cadastrar.html">Cadastrar</a>&emsp;
            <a href="./produto_listar.html">Listar</a>&emsp;
            <a href="./produto_consultar.html">Consultar</a>&emsp;
            <a href="./produto_atualizar.html">Atualizar</a>&emsp;
            <a href="./produto_apagar.html">Apagar</a>
            <br><br><hr><br>
        </nav>
    </header>
    <main>
        <h1>Atualizar Cadastro de Produto</h1>
        <br><br>
        <form>
            <label for="codProduto">Código do Produto</label><br>
            <input type="text" id="codProduto"><br><br>

            <label for="nome">Novo Nome do Produto</label><br>
            <input type="text" id="nome"><br><br>

            <label for="categoria">Nova Categoria</label><br>
            <input type="text" id="categoria"><br><br>

            <label for="numero">Novo Número/Referência</label><br>
            <input type="number" id="numero"><br><br>

            <label for="qtdeEstoque">Nova Quantidade</label><br>
            <input type="number" id="qtdeEstoque"><br><br>

            <label for="preco">Novo Preço Unitário</label><br>
            <input type="number" step="0.01" id="preco"><br><br>

            <button id="btn_atualizar">Atualizar</button><br><br><br>
        </form>
        
        <div id="resposta" class="resposta"></div>
    </main>
</body>

</html>
